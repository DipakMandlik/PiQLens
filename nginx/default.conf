server {
    listen 80;
    server_name _;

    # ─────────────────────────────────────────────────────────────
    # API routes — pass straight through, NO trailing slash logic
    # ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://app:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }

    # ─────────────────────────────────────────────────────────────
    # Next.js static assets — never redirect
    # ─────────────────────────────────────────────────────────────
    location /_next/ {
        proxy_pass         http://app:3000;
        proxy_set_header   Host              $host;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }

    # ─────────────────────────────────────────────────────────────
    # Frontend routes — enforce trailing slash (canonical URLs)
    # Skip static files (.js, .css, .png, .ico, etc.)
    # ─────────────────────────────────────────────────────────────
    location / {
        # If the URI has no trailing slash AND no file extension → 301 redirect
        if ($request_uri !~ "/$") {
            rewrite ^(/[^.]*[^/])$ $1/ permanent;
        }

        proxy_pass         http://app:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }
}
